<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Course Material</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:#1a1814;
      --bg-card:#211f1b;
      --bg-elevated:#2a2723;
      --bg-input:#252320;
      --border:rgba(255,255,255,0.08);
      --border-hover:rgba(212,168,75,0.3);
      --text-primary:#f0ebe0;
      --text-secondary:#9e9890;
      --text-muted:#5c5850;
      --accent:#d4a84b;
      --accent-glow:rgba(212,168,75,0.16);
      --accent-hover:#e8c06a;
      --success:#6ec98a;
      --error:#e07070;
      --radius:12px;
      --transition:0.2s cubic-bezier(0.4,0,0.2,1);
      --shadow-card:0 10px 34px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.04) inset;
    }

    body {
      font-family:'DM Sans',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg) !important;
      color:var(--text-primary);
      min-height:100vh;
      overflow-x:hidden;
    }

    body::before, body::after {
      content:'';
      position:fixed;
      border-radius:50%;
      filter:blur(100px);
      pointer-events:none;
      z-index:-1;
      opacity:0.16;
    }

    body::before {
      width:500px;
      height:500px;
      background:radial-gradient(circle,#c47d1a,transparent 70%);
      top:-150px;
      left:-100px;
    }

    body::after {
      width:420px;
      height:420px;
      background:radial-gradient(circle,#2a5c8a,transparent 70%);
      bottom:-120px;
      right:-90px;
    }

    .upload-wrap {
      max-width:720px;
      margin:0 auto;
      padding:28px 18px 44px;
      position:relative;
      z-index:1;
      animation:fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to { opacity:1; transform:translateY(0); }
    }

    nav {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:18px !important;
      padding:18px 20px;
      background:rgba(33,31,27,0.76);
      border:1px solid var(--border);
      border-radius:var(--radius);
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow-card);
    }

    nav h2 {
      font-family:'Lora',Georgia,serif;
      color:var(--text-primary);
      font-size:1.45rem;
      font-weight:600;
      letter-spacing:0;
    }

    nav a {
      color:var(--accent) !important;
      text-decoration:none;
      font-size:0.9rem;
      background:var(--bg-elevated);
      border:1px solid var(--border);
      border-radius:8px;
      padding:8px 13px;
      transition:background var(--transition),border-color var(--transition),color var(--transition);
    }

    nav a:hover {
      color:var(--accent-hover) !important;
      border-color:var(--border-hover);
      background:var(--accent-glow);
    }

    .logout {
      padding:8px 15px;
      border:1px solid rgba(224,112,112,0.24);
      background:rgba(224,112,112,0.1);
      color:var(--error);
      border-radius:8px;
      cursor:pointer;
      font-size:0.86rem;
      font-weight:500;
      font-family:'DM Sans',system-ui,sans-serif;
      transition:background var(--transition),border-color var(--transition);
    }

    .logout:hover { background:rgba(224,112,112,0.18); border-color:rgba(224,112,112,0.4); }

    .upload-card, .files-card {
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow-card);
    }

    .upload-card {
      padding:32px;
      margin-bottom:20px;
    }

    .files-card {
      padding:24px;
    }

    .upload-card h3, .files-card h3 {
      font-family:'Lora',Georgia,serif;
      margin-bottom:16px;
      color:var(--text-primary) !important;
      font-weight:600;
    }

    p { color:var(--text-secondary) !important; }

    .drop-zone {
      border:2px dashed rgba(212,168,75,0.32);
      border-radius:12px;
      padding:48px 24px;
      text-align:center;
      cursor:pointer;
      transition:border-color var(--transition),background var(--transition),transform var(--transition);
      background:var(--bg-elevated);
      margin-bottom:20px;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color:var(--accent);
      background:var(--accent-glow);
      transform:translateY(-2px);
    }

    .drop-zone .icon {
      font-size:3rem;
      display:block;
      margin-bottom:12px;
    }

    .drop-zone p {
      color:var(--text-secondary) !important;
      margin:0;
      font-size:0.95rem;
    }

    .drop-zone .sub {
      font-size:0.8rem;
      color:var(--text-muted) !important;
      margin-top:6px;
    }

    #file-input { display:none; }

    .file-chosen {
      background:var(--accent-glow);
      border:1px solid rgba(212,168,75,0.24);
      border-radius:8px;
      padding:12px 16px;
      display:none;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
      font-size:0.9rem;
    }

    .file-chosen span {
      color:var(--accent);
      font-weight:600;
      word-break:break-all;
    }

    .progress-bar-wrap {
      background:var(--bg-elevated);
      border-radius:8px;
      height:8px;
      margin-bottom:16px;
      display:none;
      overflow:hidden;
    }

    .progress-bar {
      height:100%;
      background:var(--accent);
      border-radius:8px;
      width:0%;
      transition:width 0.3s;
      animation:indeterminate 1.2s infinite;
    }

    @keyframes indeterminate {
      0% { width:0%; margin-left:0; }
      50% { width:60%; margin-left:20%; }
      100% { width:0%; margin-left:100%; }
    }

    .status-msg {
      text-align:center;
      padding:12px;
      border-radius:8px;
      font-size:0.9rem;
      display:none;
      margin-bottom:16px;
      border:1px solid transparent;
    }

    .status-msg.success {
      background:rgba(110,201,138,0.12);
      color:var(--success);
      border-color:rgba(110,201,138,0.24);
      display:block;
    }

    .status-msg.error {
      background:rgba(224,112,112,0.12);
      color:var(--error);
      border-color:rgba(224,112,112,0.24);
      display:block;
    }

    .status-msg.loading {
      background:var(--accent-glow);
      color:var(--accent);
      border-color:rgba(212,168,75,0.24);
      display:block;
    }

    .btn {
      width:100%;
      background:var(--accent);
      color:#1a1510;
      border:none;
      border-radius:9px;
      padding:11px 18px;
      cursor:pointer;
      font-family:'DM Sans',system-ui,sans-serif;
      font-weight:700;
      font-size:0.92rem;
      transition:background var(--transition),transform var(--transition),opacity var(--transition);
    }

    .btn:hover { background:var(--accent-hover); transform:translateY(-1px); }
    .btn:disabled { opacity:0.65; cursor:not-allowed; transform:none; }

    .file-row {
      display:flex;
      align-items:center;
      gap:12px;
      padding:11px 0;
      border-bottom:1px solid var(--border);
      font-size:0.9rem;
    }

    .file-row:last-child { border-bottom:none; }
    .file-row .file-icon { font-size:1.35rem; }

    .file-row .file-name {
      flex:1;
      color:var(--text-primary);
      word-break:break-all;
    }

    .file-row .file-badge {
      font-size:0.75rem;
      background:rgba(110,201,138,0.12);
      color:var(--success);
      border:1px solid rgba(110,201,138,0.24);
      padding:3px 8px;
      border-radius:20px;
      white-space:nowrap;
    }

    .empty-state {
      text-align:center;
      color:var(--text-secondary);
      padding:24px;
      font-size:0.9rem;
    }

    .chunk-count {
      font-size:0.8rem;
      color:var(--text-muted);
      margin-top:8px;
    }

    @media(max-width:680px) {
      .upload-wrap { padding:18px 12px 32px; }
      nav { flex-direction:column; align-items:flex-start; }
      nav > div { flex-wrap:wrap; }
      .upload-card, .files-card { padding:22px 18px; }
      .drop-zone { padding:36px 18px; }
    }

  </style>
</head>
<body>

<div class="upload-wrap">

  <nav style="margin-bottom:16px;">
    <h2>📄 Course Material</h2>
    <div style="display:flex; gap:10px; align-items:center;">
      <a href="student.html" style="color:#4f46e5; text-decoration:none; font-size:0.9rem;">← Dashboard</a>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- Upload card -->
  <div class="upload-card">
    <h3 style="margin-bottom:20px; color:#1a1a2e;">Upload your course PDFs</h3>
    <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">
      Once uploaded, the AI tutor will use your course material to give you
      answers grounded in your actual syllabus.
    </p>

    <!-- Drop zone -->
    <div
      class="drop-zone"
      id="drop-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="handleDragOver(event)"
      ondragleave="handleDragLeave(event)"
      ondrop="handleDrop(event)"
    >
     
      <p>Click to choose a PDF or drag and drop it here</p>
      <p class="sub">PDF files only · Max 50MB</p>
    </div>

    <input type="file" id="file-input" accept=".pdf" onchange="handleFileSelect(event)" />

    <!-- Chosen file name -->
    <div class="file-chosen" id="file-chosen">
      <span id="chosen-name">filename.pdf</span>
      <button
        onclick="clearFile()"
        style="background:none; border:none; cursor:pointer; color:#c53030; font-size:1.1rem;"
      >✕</button>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- Status message -->
    <div class="status-msg" id="status-msg"></div>

    <!-- Upload button -->
    <button class="btn" id="upload-btn" onclick="uploadFile()" style="display:none;">
      Upload & Embed PDF
    </button>
  </div>

  <!-- Uploaded files list -->
  <div class="files-card">
    <h3>📚 Uploaded course materials</h3>
    <div id="files-list">
      <div class="empty-state">Loading...</div>
    </div>
    <div class="chunk-count" id="chunk-count"></div>
  </div>

</div>

<script>
  const API = "http://localhost:8000"
  const token = localStorage.getItem("token")
  if (!token) window.location.href = "index.html"

  let selectedFile = null

  // ── Drag and drop ───────────────────────────────
  function handleDragOver(e) {
    e.preventDefault()
    document.getElementById("drop-zone").classList.add("dragover")
  }

  function handleDragLeave(e) {
    document.getElementById("drop-zone").classList.remove("dragover")
  }

  function handleDrop(e) {
    e.preventDefault()
    document.getElementById("drop-zone").classList.remove("dragover")
    const file = e.dataTransfer.files[0]
    if (file) setFile(file)
  }

  function handleFileSelect(e) {
    const file = e.target.files[0]
    if (file) setFile(file)
  }

  function setFile(file) {
    if (!file.name.endsWith(".pdf")) {
      showStatus("Only PDF files are allowed.", "error")
      return
    }
    if (file.size > 50 * 1024 * 1024) {
      showStatus("File too large. Max 50MB.", "error")
      return
    }

    selectedFile = file
    document.getElementById("chosen-name").textContent = file.name
    document.getElementById("file-chosen").style.display = "flex"
    document.getElementById("upload-btn").style.display = "block"
    hideStatus()
  }

  function clearFile() {
    selectedFile = null
    document.getElementById("file-input").value = ""
    document.getElementById("file-chosen").style.display = "none"
    document.getElementById("upload-btn").style.display = "none"
    hideStatus()
  }

  // ── Upload ──────────────────────────────────────
  async function uploadFile() {
    if (!selectedFile) return

    const formData = new FormData()
    formData.append("file", selectedFile)

    document.getElementById("upload-btn").disabled = true
    document.getElementById("progress-wrap").style.display = "block"
    showStatus("Uploading and embedding... this may take 15–30 seconds for large PDFs.", "loading")

    try {
      const res = await fetch(`${API}/upload-pdf`, {
        method: "POST",
        headers: { "Authorization": "Bearer " + token },
        body: formData
        // NOTE: do NOT set Content-Type header — browser sets it with boundary for FormData
      })

      document.getElementById("progress-wrap").style.display = "none"

      if (res.status === 401) { logout(); return; }

      const data = await res.json()

      if (!res.ok) {
        showStatus("❌ " + (data.detail || "Upload failed"), "error")
      } else {
        showStatus("✅ " + data.message, "success")
        clearFile()
        loadUploadedFiles()  // refresh list
      }

    } catch(e) {
      document.getElementById("progress-wrap").style.display = "none"
      showStatus("❌ Cannot reach server. Is the backend running?", "error")
    }

    document.getElementById("upload-btn").disabled = false
  }

  // ── Load uploaded files ─────────────────────────
  async function loadUploadedFiles() {
    try {
      const res = await fetch(`${API}/uploaded-pdfs`, {
        headers: { "Authorization": "Bearer " + token }
      })
      const data = await res.json()
      const list = document.getElementById("files-list")

      if (!data.files || data.files.length === 0) {
        list.innerHTML = `<div class="empty-state">
          No PDFs uploaded yet.<br>Upload your first course material above.
        </div>`
        document.getElementById("chunk-count").textContent = ""
        return
      }

      list.innerHTML = data.files.map(f => `
        <div class="file-row">
         
          <span class="file-name">${f}</span>
          <span class="file-badge">✓ Embedded</span>
        </div>
      `).join("")

      document.getElementById("chunk-count").textContent =
        `${data.chunks_in_db} text chunks stored in knowledge base`

    } catch(e) {
      document.getElementById("files-list").innerHTML =
        `<div class="empty-state">Could not load files.</div>`
    }
  }

  // ── Helpers ─────────────────────────────────────
  function showStatus(msg, type) {
    const el = document.getElementById("status-msg")
    el.textContent = msg
    el.className = "status-msg " + type
  }

  function hideStatus() {
    const el = document.getElementById("status-msg")
    el.className = "status-msg"
    el.style.display = "none"
  }

  function logout() {
    localStorage.clear()
    window.location.href = "index.html"
  }

  loadUploadedFiles()
</script>

</body>
</html>
